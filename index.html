<!DOCTYPE html>
<html lang="en">

<head>

    <meta
  name="description"
  content="Minimal fast typing test with smooth modern UI"
/>

<meta
  name="keywords"
  content="typing test,wpm test,typing speed,keyboard practice"
/>

<meta
  name="robots"
  content="index, follow"
/>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  
  <link
  rel="icon"
  href="favicon.ico"
/>

  <title>Typing Test</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#111111;

      color:#f5f5f5;

      font-family:'JetBrains Mono', monospace;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      overflow:hidden;

      padding:20px;

    }

    .container{

      width:min(1000px,90%);

      position:relative;

    }

    .container::before{

      content:"";

      position:absolute;

      inset:-120px;

      background:
        radial-gradient(
          circle,
          rgba(255,209,102,0.06),
          transparent 70%
        );

      z-index:-1;

    }

    .logo{

      color:#ffd166;

      font-size:14px;

      margin-bottom:40px;

      letter-spacing:2px;

      text-transform:uppercase;

    }

    .topbar{

      display:flex;

      gap:28px;

      margin-bottom:40px;

      color:#777;

      font-size:15px;

    }

    .typing-box{

      position:relative;

      font-size:34px;

      line-height:1.8;

      color:#555;

      user-select:none;

      max-height:240px;

      overflow:hidden;

      word-wrap:break-word;

    }

    .word{

      display:inline-block;

      margin-right:14px;

    }

    .char{

      transition:0.08s;

    }

    .char.correct{
      color:#f5f5f5;
    }

    .char.incorrect{
      color:#ff6b6b;
    }

    .char.active{
      color:#ffd166;
    }

    #caret{

      position:absolute;

      width:2px;

      height:42px;

      background:#ffd166;

      border-radius:4px;

      transition:
        left 0.05s linear,
        top 0.05s linear;

      animation:blink 1s infinite;

    }

    @keyframes blink{

      50%{
        opacity:0;
      }

    }

    .result{

      margin-top:36px;

      color:#ffd166;

      font-size:24px;

      font-weight:600;

      display:none;

      animation:fadeIn 0.3s ease;

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(10px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    .footer{

      margin-top:42px;

      color:#666;

      font-size:12px;

      letter-spacing:2px;

      text-transform:uppercase;

    }

    @media(max-width:768px){

      .typing-box{

        font-size:24px;

        line-height:1.9;

      }

      #caret{
        height:30px;
      }

      .topbar{

        gap:18px;

        font-size:13px;

      }

      .result{
        font-size:20px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="logo">
      Typing Test
    </div>

    <div class="topbar">

      <div>
        <span id="wpm">0</span> wpm
      </div>

      <div>
        <span id="accuracy">100</span>%
      </div>

      <div>
        <span id="time">30</span>s
      </div>

    </div>

    <div
      class="typing-box"
      id="words"
    ></div>

    <div id="caret"></div>

    <div
      class="result"
      id="result"
    ></div>

    <div class="footer">
      press tab to restart
    </div>

  </div>

  <script src="sentences.js"></script>

  <script src="app.js"></script>

</body>

</html>
