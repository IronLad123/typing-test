```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Test</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#111;
      color:#ddd;
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:20px;
    }

    .topbar{
      width:100%;
      max-width:900px;
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      font-size:18px;
      color:#aaa;
    }

    .typing-box{
      width:100%;
      max-width:900px;
      line-height:42px;
      font-size:32px;
      position:relative;
      user-select:none;
      word-wrap:break-word;
    }

    .word{
      margin-right:14px;
      display:inline-block;
    }

    .char{
      position:relative;
      color:#666;
    }

    .char.correct{
      color:#fff;
    }

    .char.incorrect{
      color:#ff5c5c;
    }

    .char.active{
      background:#333;
      border-radius:3px;
    }

    #caret{
      width:2px;
      height:38px;
      background:#fff;
      position:absolute;
      top:0;
      left:0;
      transition:0.05s;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0;
      }
    }

    .footer{
      margin-top:25px;
      color:#666;
      font-size:14px;
    }

    .result{
      margin-top:20px;
      font-size:24px;
      display:none;
      color:#fff;
    }

    .ad{
      margin:20px 0;
      width:100%;
      max-width:900px;
      height:70px;
      background:#1d1d1d;
      border:1px solid #2a2a2a;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#666;
      font-size:14px;
    }

    @media(max-width:768px){
      .typing-box{
        font-size:24px;
        line-height:34px;
      }

      #caret{
        height:30px;
      }
    }
  </style>
</head>

<body>

  <div class="ad">
    Ad Space
  </div>

  <div class="topbar">
    <div>WPM: <span id="wpm">0</span></div>
    <div>Accuracy: <span id="accuracy">100</span>%</div>
    <div>Time: <span id="time">30</span>s</div>
  </div>

  <div class="typing-box" id="words"></div>

  <div id="caret"></div>

  <div class="result" id="result"></div>

  <div class="footer">
    TAB = restart
  </div>

  <script src="sentences.js"></script>
  <script src="app.js"></script>
</body>
</html>
```
